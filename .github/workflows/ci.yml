name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.stage }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stage:
          - "stage 1 - tcp echo server"
          - "stage 2 - thread per connection"
          - "stage 3 - resp protocol"
          - "stage 4 - core kv store"
          - "stage 5 - expiration"
          - "stage 6 - data types"
          - "stage 7 - async rewrite"
          - "stage 8 - persistence"
          - "stage 9 - pub sub"
          - "stage 10 - eviction"
          - "stage 11 - benchmark"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Deliberately does NOT cache `target/`. It did originally, keyed
      # only on Cargo.lock's hash (which barely ever changes, since
      # dependencies rarely do) — meaning almost every push restored a
      # `target/` from a *previous* commit's source and did an
      # incremental rebuild on top of it. Rust's incremental compilation
      # is usually safe, but stale-artifact corruption producing wrong
      # *runtime* behavior with no compile error is a real, documented
      # category of bug, and it's exactly the shape of one real failure
      # this workflow produced: a test failed once in CI, immediately,
      # non-reproducibly, and passed cleanly on every one of 150 local
      # runs against a fresh build. Caching the registry/git download
      # cache is safe (those are immutable once downloaded, never
      # recompiled by this project's own changing source) and is where
      # nearly all the setup time actually goes for a handful of small
      # dependencies like this project has, so it's kept.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-deps-${{ matrix.stage }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.stage)) }}
          restore-keys: |
            ${{ runner.os }}-cargo-deps-${{ matrix.stage }}-

      - name: cargo test
        working-directory: ${{ matrix.stage }}
        run: cargo test --all-targets

      - name: cargo clippy
        working-directory: ${{ matrix.stage }}
        run: cargo clippy --all-targets -- -D warnings
